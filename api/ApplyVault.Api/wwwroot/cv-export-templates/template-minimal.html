<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CV</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Georgia, 'Times New Roman', serif; margin: 0; padding: 0; color: #111; font-size: 13px; line-height: 1.45; }
    .cv-body { padding: 0; }
    .cv-photo { width: 88px; height: 88px; object-fit: cover; float: right; margin: 0 0 12px 16px; }
    .section { margin-bottom: 18px; }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #111; padding-bottom: 3px; margin: 0 0 10px; }
    .entry { margin-bottom: 14px; }
    .entry-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 4px 12px; }
    .entry-title { font-weight: 700; }
    .entry-date { font-size: 12px; color: #444; }
    .entry-subtitle { font-style: italic; margin-top: 2px; }
    .entry-summary { margin: 6px 0 0; }
    .entry-bullets { margin: 6px 0 0 20px; padding: 0; }
    .entry-bullets li { margin-bottom: 3px; }
    .entry-tech { font-size: 12px; color: #333; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="cv-body">
    {{ProfilePhotoHtml}}
    {{MainHtml}}
  </div>
</body>
</html>
