services:
  api:
    build:
      context: ../api/ApplyVault.Api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      ASPNETCORE_URLS: http://+:8080
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
