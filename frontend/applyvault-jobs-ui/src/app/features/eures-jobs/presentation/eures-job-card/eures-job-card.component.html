<button
  type="button"
  class="job-card"
  [class.job-card--selected]="selected()"
  [attr.data-job-id]="job().id"
  [attr.aria-current]="selected() ? 'true' : null"
  (click)="choose.emit(job().id)">
  <div class="job-card__top">
    <span class="job-card__monogram" aria-hidden="true">EU</span>
    <div class="job-card__eyebrow">
      <span>EURES</span>
      @if (postedAt(); as date) {
        <span>{{ date | date: 'MMM d, y':'UTC' }}</span>
      }
    </div>
    @if (saved()) {
      <span class="job-card__status job-card__status--interview">Saved</span>
    }
  </div>

  <h3>{{ job().title || 'Untitled listing' }}</h3>
  <p class="job-card__company">{{ job().employer || 'Unknown employer' }}</p>

  <div class="job-card__meta">
    <span>{{ job().location || 'Location not specified' }}</span>
  </div>
</button>
