<main class="calendar-callback">
  <section class="calendar-callback__card">
    <p class="calendar-callback__eyebrow">Calendar connection</p>
    <h1>
      @if (success) {
        {{ provider | titlecase }} connected
      } @else {
        Connection failed
      }
    </h1>

    <p>
      @if (success) {
        The provider is now available when you create interview events.
      } @else {
        The provider redirect did not complete successfully. Try connecting the account again.
      }
    </p>

    <a routerLink="/jobs">Return to jobs</a>
  </section>
</main>
