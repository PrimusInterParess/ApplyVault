<button
  type="button"
  class="job-card"
  [class.job-card--selected]="selected()"
  [attr.data-job-id]="job().id"
  [attr.aria-current]="selected() ? 'true' : null"
  (click)="choose.emit(job().id)">
  <div class="job-card__header">
    <span class="job-card__monogram" aria-hidden="true">{{ sourceMonogram(job().sourceHostname) }}</span>
    <div class="job-card__heading">
      <h3>{{ job().title }}</h3>
      <p class="job-card__company">{{ job().company }}</p>
    </div>
    @if (cardStatus(); as status) {
      <span
        class="job-card__status"
        [class.job-card__status--interview]="status.variant === 'interview' || status.variant === 'gmail'"
        [class.job-card__status--review]="status.variant === 'review'">
        {{ status.label }}
        @if (status.overflowCount > 0) {
          <span class="job-card__status-overflow">+{{ status.overflowCount }}</span>
        }
      </span>
    }
  </div>

  <div class="job-card__meta">
    <span class="job-card__pill">
      <span class="job-card__pill-icon" aria-hidden="true">⌖</span>
      {{ job().location }}
    </span>
    <span class="job-card__pill">
      <span class="job-card__pill-icon" aria-hidden="true">◆</span>
      {{ job().sourceHostname }}
    </span>
    <span class="job-card__pill job-card__pill--muted">
      {{ job().savedAt | date: 'MMM d, y' }}
    </span>
  </div>

  @if (job().excerpt) {
    <p class="job-card__excerpt">{{ job().excerpt }}</p>
  }
</button>
