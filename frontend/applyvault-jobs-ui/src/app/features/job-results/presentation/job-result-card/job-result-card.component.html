<button
  type="button"
  class="job-card"
  [class.job-card--selected]="selected()"
  (click)="choose.emit(job().id)">
  <div class="job-card__eyebrow">
    <span>{{ job().sourceHostname }}</span>
    <span>{{ job().savedAt | date: 'MMM d, y' }}</span>
  </div>

  @if (job().isRejected) {
    <span class="job-card__status">Rejected</span>
  }

  @if (job().captureQuality.needsReview) {
    <span class="job-card__status job-card__status--review">Needs review</span>
  }

  @if (job().interviewEvent) {
    <span class="job-card__status job-card__status--interview">
      Interview {{ formatInterviewEventWindow(job().interviewEvent) }}
    </span>
  }

  @if (statusSyncLabel(); as syncLabel) {
    <span class="job-card__status" [class.job-card__status--interview]="job().statusSync?.kind === 'interview'">
      {{ syncLabel }}
    </span>
  }

  <h3>{{ job().title }}</h3>
  <p class="job-card__company">{{ job().company }}</p>

  <div class="job-card__meta">
    <span>{{ job().location }}</span>
    <span>{{ job().detectedPageType }}</span>
  </div>

  <p class="job-card__excerpt">{{ job().excerpt }}</p>
</button>
