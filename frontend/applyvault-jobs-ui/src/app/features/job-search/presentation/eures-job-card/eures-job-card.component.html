<button
  type="button"
  class="job-card"
  [class.job-card--selected]="selected()"
  [attr.data-job-id]="job().id"
  [attr.aria-current]="selected() ? 'true' : null"
  (click)="choose.emit(job().id)">
  <div class="job-card__header">
    <span class="job-card__monogram" aria-hidden="true">EU</span>
    <div class="job-card__heading">
      <h3>{{ job().title || 'Untitled listing' }}</h3>
      <p class="job-card__company">{{ job().employer || 'Unknown employer' }}</p>
    </div>
    @if (saved()) {
      <span class="job-card__status job-card__status--interview">Saved</span>
    }
  </div>

  <div class="job-card__meta">
    <span class="job-card__pill">
      <span class="job-card__pill-icon" aria-hidden="true">⌖</span>
      {{ job().location || 'Location not specified' }}
    </span>
    <span class="job-card__pill">
      <span class="job-card__pill-icon" aria-hidden="true">EU</span>
      EURES
    </span>
    @if (postedAt(); as date) {
      <span class="job-card__pill job-card__pill--muted">
        {{ date | date: 'MMM d, y':'UTC' }}
      </span>
    }
  </div>
</button>
