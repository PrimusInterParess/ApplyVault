<div class="app-shell">
  <header class="app-shell__header">
    <div class="app-shell__header-inner">
      <a routerLink="/jobs" class="app-shell__brand" aria-label="ApplyVault home">
        <span class="app-shell__logo-mark" aria-hidden="true">AV</span>
        <span class="app-shell__logo-text">ApplyVault</span>
      </a>

      <nav class="app-shell__nav" aria-label="Primary navigation">
        <a
          routerLink="/jobs"
          routerLinkActive="app-shell__nav-link--active"
          class="app-shell__nav-link">
          Jobs
        </a>
        <a
          routerLink="/eures"
          routerLinkActive="app-shell__nav-link--active"
          class="app-shell__nav-link">
          EURES
        </a>
        <a
          routerLink="/my-cv"
          routerLinkActive="app-shell__nav-link--active"
          class="app-shell__nav-link">
          My CV
        </a>
        <a
          routerLink="/cv-projects"
          routerLinkActive="app-shell__nav-link--active"
          class="app-shell__nav-link">
          Projects
        </a>
        <a
          routerLink="/settings"
          routerLinkActive="app-shell__nav-link--active"
          class="app-shell__nav-link">
          Settings
        </a>
      </nav>

      <div class="app-shell__actions">
        @if (auth.currentUser(); as currentUser) {
          <p class="app-shell__session">
            {{ currentUser.displayName || currentUser.email || currentUser.supabaseUserId }}
          </p>
        }
        <button type="button" class="app-shell__sign-out" (click)="signOut()">Sign out</button>
      </div>
    </div>
  </header>

  <main class="app-shell__content">
    <router-outlet />
  </main>

  <footer class="app-shell__footer">
    <div class="app-shell__footer-inner">
      <p class="app-shell__copyright">&copy; ApplyVault</p>
      <nav class="app-shell__footer-nav" aria-label="Footer navigation">
        <a routerLink="/jobs" class="app-shell__footer-link">Jobs</a>
        <a routerLink="/eures" class="app-shell__footer-link">EURES</a>
        <a routerLink="/settings" class="app-shell__footer-link">Settings</a>
      </nav>
    </div>
  </footer>
</div>
